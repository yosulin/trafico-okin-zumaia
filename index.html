<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tráfico desde OKIN Zumaia</title>
  <meta name="description" content="Estado del tráfico en tiempo real desde OKIN Zumaia hacia Zarautz, Donostia, Eibar e Irún.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#4A6FA5">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="carretera-decorativa" aria-hidden="true"></div>

  <header class="cabecera">
    <div class="cabecera__origen">
      <span class="cabecera__eyebrow">Salida desde</span>
      <h1 class="cabecera__titulo">OKIN Zumaia</h1>
    </div>

    <div class="cabecera__estado">
      <span class="indicador-carga" id="indicador-carga" aria-hidden="true"></span>
      <span class="cabecera__actualizacion" id="ultima-actualizacion">Cargando datos de tráfico…</span>
      <button class="boton boton--primario boton-instalar" id="boton-instalar" type="button" hidden>📲 Instalar app</button>
      <button class="boton-ajustes" id="boton-tv" type="button" aria-label="Modo TV">📺</button>
    </div>
  </header>

  <div class="aviso-ios" id="aviso-ios" hidden>
    <span>En iPhone/iPad: pulsa <strong>Compartir</strong> <span aria-hidden="true">⬆️</span> y luego <strong>«Añadir a pantalla de inicio»</strong> para instalar la app.</span>
    <button type="button" id="cerrar-aviso-ios" aria-label="Cerrar aviso">✕</button>
  </div>

  <main class="grid-destinos" id="grid-destinos" aria-live="polite">
    <!-- Las tarjetas de destino se generan dinámicamente desde config.js -->
  </main>

  <footer class="pie">
    Este panel es un indicador orientativo. Antes de salir, comprueba siempre la mejor ruta en tu navegador GPS.
  </footer>

  <script src="js/config.js"></script>
  <script src="js/estado.js"></script>
  <script src="js/datos.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
